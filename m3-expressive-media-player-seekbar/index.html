<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Material Design 3 Expressive Media Player Seekbar - demo.limhenry.xyz</title>
    <style>
      :root {
        --color-primary: #d0bcff;
        --color-secondary: #4a4458;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: sans-serif;
        max-width: 860px;
        margin: auto;
        padding: 8px;
      }

      hr {
        margin-top: 2rem;
      }

      .demo {
        background-color: #141314;
        padding: 36px 24px;
        border-radius: 16px;
      }

      .progress {
        display: flex;
        align-items: center;
        width: 100%;
        position: relative;

        .active {
          min-width: 0;
          height: 20px;
        }

        .thumb {
          width: 8px;
          height: 44px;
          background-color: var(--color-primary);
          border-radius: 8px;
        }

        .track {
          flex: 1;
          position: relative;
          background-color: var(--color-secondary);
          height: 8px;
          border-radius: 0 8px 8px 0;
          overflow: hidden;

          &:after {
            content: "";
            position: absolute;
            width: 4px;
            height: 4px;
            background-color: var(--color-primary);
            border-radius: 50%;
            right: 2px;
            top: 2px;
          }
        }

        input {
          position: absolute;
          width: 100%;
          height: 100%;
          opacity: 0;
          cursor: pointer;
          margin: 0;
        }
      }
    </style>
  </head>
  <body>
    <h1>Material Design 3 Expressive Media Player Seekbar</h1>
    <div>
      <a href="#" target="_blank">Article</a>
      <span>&middot;</span>
      <a
        href="https://github.com/limhenry/demo/blob/main/m3-expressive-media-player-seekbar/index.html"
        target="_blank"
      >
        Source Code
      </a>
    </div>

    <hr />

    <h2>Demo</h2>
    <div class="demo">
      <div class="progress">
        <canvas class="active"></canvas>
        <div class="thumb"></div>
        <div class="track"></div>

        <input
          class="input"
          type="range"
          min="0"
          max="100"
          value="50"
          step="0.1"
        />
      </div>
    </div>

    <script>
      const SCALE = 3;
      const WAVE_THICKNESS = 8 * SCALE;
      const WAVE_AMPLITUDE = 4 * SCALE;
      const WAVE_WAVELENGTH = 40 * SCALE;
      const WAVE_SPEED = 30 * SCALE;
      const WAVE_FREQUENCY = (2 * Math.PI) / WAVE_WAVELENGTH;

      const input = document.querySelector("input");
      const canvas = document.querySelector("canvas");
      const ctx = canvas.getContext("2d");

      let animationOffset = 0;

      const render = () => {
        const progressY = canvas.height / 2;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.beginPath();
        ctx.lineWidth = WAVE_THICKNESS;
        ctx.strokeStyle = getComputedStyle(document.documentElement)
          .getPropertyValue("--color-primary")
          .trim();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        let x = ctx.lineWidth / 2;
        while (x < canvas.width - ctx.lineWidth / 2 + 16) {
          const y =
            WAVE_AMPLITUDE * Math.sin(WAVE_FREQUENCY * (x - animationOffset)) +
            progressY;
          x === ctx.lineWidth / 2 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          x += 1;
        }
        ctx.stroke();
      };

      const draw = (timestamp) => {
        animationOffset = timestamp * (WAVE_SPEED / 1000);
        render();
        requestAnimationFrame(draw);
      };

      const resizeObserver = new ResizeObserver((entries) => {
        for (const entry of entries) {
          canvas.width = entry.contentRect.width * SCALE;
          canvas.height = entry.contentRect.height * SCALE;
          render();
        }
      });
      resizeObserver.observe(canvas);

      const updateWidth = () => {
        canvas.style.width = `${input.value}%`;
      };
      input.addEventListener("input", updateWidth);

      updateWidth();
      requestAnimationFrame(draw);
    </script>
  </body>
</html>
